name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  boundary:
    name: Boundary Guard (research-only root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enforce PM99RE repo boundary
        run: |
          python scripts/check_repo_boundary.py

  submodules:
    name: Submodule Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show submodule status
        run: |
          git submodule status
